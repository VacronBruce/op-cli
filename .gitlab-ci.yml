stages:
  - lint
  - test
  - build

variables:
  GO_VERSION: "1.24"

lint:
  stage: lint
  image: golangci/golangci-lint:v2.1-alpine
  script:
    - golangci-lint run ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "main"

test:
  stage: test
  image: golang:${GO_VERSION}-alpine
  script:
    - go test -race -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    paths:
      - coverage.out
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "main"

build:
  stage: build
  image: golang:${GO_VERSION}-alpine
  script:
    - GOOS=darwin GOARCH=arm64 go build -o dist/op-darwin-arm64 .
    - GOOS=darwin GOARCH=amd64 go build -o dist/op-darwin-amd64 .
    - GOOS=linux GOARCH=amd64 go build -o dist/op-linux-amd64 .
  artifacts:
    paths:
      - dist/
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "main"
