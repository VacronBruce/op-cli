stages:
  - test
  - build

variables:
  GO_VERSION: "1.24.2"
  GOROOT: /tmp/go
  GOPATH: /tmp/gopath

before_script:
  - export PATH=/tmp/go/bin:/tmp/gopath/bin:$PATH
  - |
    if [ ! -x /tmp/go/bin/go ]; then
      echo "Installing Go ${GO_VERSION}..."
      wget -q "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz" -O /tmp/go.tar.gz
      tar -C /tmp -xzf /tmp/go.tar.gz
      rm /tmp/go.tar.gz
    fi
  - go version

test:
  stage: test
  script:
    - go test -race -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    paths:
      - coverage.out
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

build:
  stage: build
  script:
    - mkdir -p dist
    - GOOS=darwin GOARCH=arm64 go build -o dist/op-darwin-arm64 .
    - GOOS=darwin GOARCH=amd64 go build -o dist/op-darwin-amd64 .
    - GOOS=linux GOARCH=amd64 go build -o dist/op-linux-amd64 .
    - ls -lh dist/
  artifacts:
    paths:
      - dist/
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "main"
