stages:
  - test
  - build

test:
  stage: test
  # debian-based image: -race needs cgo and a C toolchain (alpine + CGO_ENABLED=0 cannot run it)
  image: golang:1.24
  tags:
    - golang
  variables:
    CGO_ENABLED: "1"
    # Coverage ratchet: bumped to (new total - 0.5) in every MR that adds tests.
    COVERAGE_FLOOR: "62.5"
  script:
    - go test -race -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out
    - |
      total=$(go tool cover -func=coverage.out | awk '/^total:/ {sub("%","",$3); print $3}')
      echo "total coverage: ${total}% (floor: ${COVERAGE_FLOOR}%)"
      awk -v t="$total" -v f="$COVERAGE_FLOOR" 'BEGIN { if (t+0 < f+0) { print "FAIL: coverage " t "% is below floor " f "%"; exit 1 } }'
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    paths:
      - coverage.out
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

build:
  stage: build
  image: golang:1.24-alpine
  tags:
    - golang
  variables:
    CGO_ENABLED: "0"
  script:
    - mkdir -p dist
    - GOOS=darwin GOARCH=arm64 go build -o dist/op-darwin-arm64 .
    - GOOS=darwin GOARCH=amd64 go build -o dist/op-darwin-amd64 .
    - GOOS=linux GOARCH=amd64 go build -o dist/op-linux-amd64 .
    - ls -lh dist/
  artifacts:
    paths:
      - dist/
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "main"
